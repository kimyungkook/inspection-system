name: stock_ai_guide
description: AI 주식 매매 가이드 앱
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 라우팅
  go_router: ^13.2.0

  # HTTP 통신
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # 보안 저장소 (JWT 토큰)
  flutter_secure_storage: ^9.0.0

  # 로컬 저장소 (설정값)
  shared_preferences: ^2.2.3

  # 차트
  fl_chart: ^0.67.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0          # 로딩 스켈레톤
  lottie: ^3.1.0            # 애니메이션

  # 유틸
  intl: ^0.19.0             # 숫자/날짜 포맷
  equatable: ^2.0.5         # 모델 비교
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700
