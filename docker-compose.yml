# =============================================================
# AI 주식 매매 가이드 앱 - 전체 실행 환경 설정 파일
# 이 파일 1개로 앱에 필요한 모든 프로그램이 동시에 실행됩니다.
# 실행 방법: docker-compose up -d
# 중지 방법: docker-compose down
# =============================================================

version: '3.9'

services:

  # -------------------------------------------------------
  # 1. 백엔드 서버 (앱의 두뇌 — API 처리, AI 분석 담당)
  # -------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-backend
    restart: always
    ports:
      - "8000:8000"        # 브라우저에서 localhost:8000 으로 접속 가능
    env_file:
      - .env               # 사용자가 입력한 API 키 등 설정 파일
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app     # 코드 변경 시 자동 반영
    networks:
      - stock-network

  # -------------------------------------------------------
  # 2. 데이터베이스 (모든 정보 저장소 — 회원, 종목, 분석결과)
  # -------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: stock-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-stockapp}
      POSTGRES_USER: ${DB_USER:-stockuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stockpass123!}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # 데이터 영구 보관
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stockuser} -d ${DB_NAME:-stockapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-network

  # -------------------------------------------------------
  # 3. 빠른 임시저장소 (알림 처리, 초대코드, 시세 캐시 담당)
  # -------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: stock-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123!}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass123!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-network

  # -------------------------------------------------------
  # 4. 백그라운드 작업자 (실시간 시세수집, 지표계산, 알림발송)
  # -------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-celery-worker
    restart: always
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - db
    volumes:
      - ./backend:/app
    networks:
      - stock-network

  # -------------------------------------------------------
  # 5. 작업 스케줄러 (매일 07:00 AI 분석, 1분마다 지표 계산 예약)
  # -------------------------------------------------------
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-celery-beat
    restart: always
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - db
    volumes:
      - ./backend:/app
    networks:
      - stock-network

  # -------------------------------------------------------
  # 6. 관리자 웹 페이지 (브라우저에서 통계/모니터링 확인)
  # -------------------------------------------------------
  flower:
    image: mher/flower:latest
    container_name: stock-flower
    restart: always
    command: celery flower --broker=redis://:${REDIS_PASSWORD:-redispass123!}@redis:6379/0
    ports:
      - "5555:5555"        # localhost:5555 로 작업 현황 확인
    depends_on:
      - redis
    networks:
      - stock-network

# -------------------------------------------------------
# 데이터 영구 보관 공간 (컨테이너 재시작해도 데이터 유지)
# -------------------------------------------------------
volumes:
  postgres_data:
  redis_data:

# -------------------------------------------------------
# 내부 통신망 (각 서비스들이 서로 통신하는 가상 네트워크)
# -------------------------------------------------------
networks:
  stock-network:
    driver: bridge
